<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PROC MONITOR — SKRoot Pro</title>
  <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="overlay-styles.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="logo">▪</span>
        <h1>Proc Monitor</h1>
      </div>
      <div class="header-right">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">OFFLINE</span>
      </div>
    </header>

    <!-- 页面容器 -->
    <div class="page active" id="page-overview">
      <div class="page-title">概览</div>
      
      <!-- 悬浮窗设置 -->
      <div class="section-block overlay-section">
        <div class="section-header">
          <span class="section-label">悬浮窗</span>
          <div class="status-pill" id="overlayStatusPill">
            <span class="status-dot" id="overlayStatusDot"></span>
            <span class="status-text" id="overlayStatus">未运行</span>
          </div>
        </div>
        
        <div class="overlay-control">
          <button class="overlay-toggle-btn" id="overlayToggleBtn" onclick="toggleOverlay()">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 3l14 9-14 9V3z"/>
            </svg>
            <span id="overlayBtnText">启动悬浮窗</span>
          </button>
        </div>
        
        <div class="overlay-settings">
          <div class="setting-row">
            <div class="setting-info">
              <span class="setting-label">快速刷新</span>
              <span class="setting-desc">2秒更新间隔</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="fastRefreshToggle" onchange="toggleFastRefresh()">
              <span class="toggle-slider"></span>
            </label>
          </div>
          
          <div class="setting-row">
            <div class="setting-info">
              <span class="setting-label">背景样式</span>
              <span class="setting-desc" id="currentStyleDesc">半透明黑底</span>
            </div>
            <div class="style-selector">
              <button class="style-btn active" id="styleBtn0" onclick="setOverlayStyle(0)" data-style="0">
                <div class="style-preview preview-dark"></div>
                <span>深色</span>
              </button>
              <button class="style-btn" id="styleBtn1" onclick="setOverlayStyle(1)" data-style="1">
                <div class="style-preview preview-transparent"></div>
                <span>透明</span>
              </button>
            </div>
          </div>

          <div class="setting-row">
            <div class="setting-info">
              <span class="setting-label">双电芯电池</span>
              <span class="setting-desc">同时读取两个电池功率</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="dualBatteryToggle" onchange="toggleDualBattery()">
              <span class="toggle-slider"></span>
            </label>
          </div>
          
          <div class="setting-row">
            <div class="setting-info">
              <span class="setting-label">API Key 认证</span>
              <span class="setting-desc">启用后需要 API Key 访问</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="apiKeyToggle" onchange="toggleApiKey()">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="section-block">
        <div class="section-header">
          <span class="section-label">进程概况</span>
        </div>
        <div class="summary-grid" id="overviewSummary">
          <div class="summary-item"><span class="summary-dot dot-system"></span><span class="summary-name">系统级</span><span class="summary-val" id="sumSystem">0</span></div>
          <div class="summary-item"><span class="summary-dot dot-app"></span><span class="summary-name">第三方</span><span class="summary-val" id="sumThirdParty">0</span></div>
        </div>
      </div>

      <div class="section-block">
        <div class="section-header">
          <span class="section-label">电源</span>
        </div>
        <div class="power-mini" id="overviewPower">
          <div class="power-mini-level"><span class="power-mini-num" id="miniBatt">--</span><span class="power-mini-pct">%</span></div>
          <div class="power-mini-status" id="miniBattStatus">--</div>
        </div>
      </div>
    </div>

    <div class="page" id="page-procs">
      <div class="page-title">进程</div>
      <div class="page-toolbar">
        <input type="text" class="search-input" id="procSearchInput" placeholder="搜索进程名、PID或命令行..." oninput="filterProcs()">
        <button class="btn-sm" onclick="fetchProcs()">刷新</button>
      </div>
      <div class="cat-bar">
        <button class="cat-btn active" data-cat="third-party" onclick="switchProcCat('third-party')"><span class="cat-label">第三方</span><span class="cat-count" id="catThirdParty">0</span></button>
        <button class="cat-btn" data-cat="system" onclick="switchProcCat('system')"><span class="cat-label">系统级</span><span class="cat-count" id="catSystem">0</span></button>
        <button class="cat-btn" data-cat="all" onclick="switchProcCat('all')"><span class="cat-label">全部</span></button>
      </div>
      <div class="proc-count" id="procCount">加载中...</div>
      <div class="event-list" id="procList">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <div class="page" id="page-power">
      <div class="page-title">电源</div>
      <div class="charging-overview" id="chargingOverview">
        <div class="loading">加载中...</div>
      </div>
      <div class="charging-details" id="chargingDetails"></div>
      <div class="charging-supplies" id="chargingSupplies"></div>
    </div>

    <div class="page" id="page-drain">
      <div class="page-title">应用功耗 <button id="drainToggle" class="drain-toggle mode-app" onclick="toggleDrainMode()">按应用估算</button></div>
      <div class="drain-summary" id="drainSummary"></div>
      <div class="drain-list" id="drainList">
        <div class="loading">采样中...</div>
      </div>
      <div class="drain-note" id="drainNote">⚠️ 功耗按 CPU 时间占比分摊实际电池功率，仅为估算值（不含屏幕/GPU/网络）</div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-page="overview" onclick="switchPage('overview')">
        <span class="nav-icon">▪</span>
        <span class="nav-label">概览</span>
      </button>
      <button class="nav-btn" data-page="procs" onclick="switchPage('procs')">
        <span class="nav-icon">▪</span>
        <span class="nav-label">进程</span>
        <span class="nav-badge" id="navProcBadge" style="display:none">0</span>
      </button>
      <button class="nav-btn" data-page="power" onclick="switchPage('power')">
        <span class="nav-icon">▪</span>
        <span class="nav-label">电源</span>
      </button>
      <button class="nav-btn" data-page="drain" onclick="switchPage('drain')">
        <span class="nav-icon">▪</span>
        <span class="nav-label">功耗</span>
      </button>
    </nav>
  </div>

  <!-- 详情浮层 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modalTitle">详情</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- API Key 设置弹窗 -->
  <div class="modal-overlay" id="apiKeyModal" style="display:none" onclick="closeApiKeyModal()">
    <div class="modal apikey-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>API Key 设置</h3>
        <button class="modal-close" onclick="closeApiKeyModal()">✕</button>
      </div>
      <div class="modal-body apikey-body">
        <p class="apikey-desc">自动生成的 Key（点击下方可输入自定义 Key）：</p>
        <div class="apikey-auto" id="apiKeyAutoDisplay"></div>
        <div class="apikey-divider"><span>或输入自定义 Key</span></div>
        <input type="text" id="apiKeyInput" class="apikey-input" placeholder="输入自定义 API Key（≥8位）" autocomplete="off" spellcheck="false">
        <div class="apikey-actions">
          <button class="btn btn-secondary" onclick="useAutoApiKey()">使用自动生成</button>
          <button class="btn btn-primary" onclick="useCustomApiKey()">使用自定义</button>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
